<section class="py-20 relative">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center space-x-4 mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Experience</h2>
      <div class="h-px bg-surfaceBorder flex-grow max-w-xs"></div>
    </div>

    <div class="space-y-12 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-surfaceBorder before:to-transparent">
      
      <!-- Experience Item -->
      <div *ngFor="let exp of experiences" class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
        
        <!-- Timeline Marker -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-background bg-primary/20 text-primary shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 transition-transform group-hover:scale-110">
          <div class="w-3 h-3 bg-primary rounded-full"></div>
        </div>

        <!-- Content Card -->
        <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-6 glass-card group-hover:border-primary/40 transition-all duration-300 transform group-hover:-translate-y-1">
          <div class="flex flex-col mb-4">
            <h3 class="font-bold text-xl text-white">{{ exp.role }}</h3>
            <div class="text-primary font-medium mt-1">{{ exp.company }}</div>
            <div class="flex flex-wrap items-center gap-3 text-xs text-slate-400 mt-2 font-mono">
              <span class="flex items-center"><ng-icon name="lucideChevronRight" size="14" class="mr-1"></ng-icon> {{ exp.duration }}</span>
              <span class="flex items-center px-2 py-1 bg-surfaceBorder/30 rounded">{{ exp.location }}</span>
            </div>
          </div>
          
          <ul class="space-y-3 mt-4">
            <li *ngFor="let achievement of exp.achievements" class="flex items-start text-sm text-slate-300">
              <span class="text-secondary mr-2 mt-0.5">▹</span>
              <span class="leading-relaxed">{{ achievement }}</span>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</section>
