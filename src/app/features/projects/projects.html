<section class="py-20 relative">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center space-x-4 mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Featured Projects</h2>
      <div class="h-px bg-surfaceBorder flex-grow max-w-xs"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
      
      <div *ngFor="let project of projects" class="glass-card flex flex-col justify-between overflow-hidden group h-full">
        <div class="p-8 flex flex-col h-full">
          <!-- Folder / Abstract Icon Header -->
          <div class="flex justify-between items-start mb-6">
            <div class="text-primary opacity-50 group-hover:opacity-100 transition-opacity">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <div class="flex items-center gap-3">
              @if (project.githubLink) {
                <a [href]="project.githubLink" target="_blank" class="text-slate-400 hover:text-white transition-colors" aria-label="GitHub">
                  <ng-icon name="lucideGithub" size="20"></ng-icon>
                </a>
              }
              @if (project.liveLink) {
                <a [href]="project.liveLink" target="_blank" class="text-slate-400 hover:text-primary transition-colors" aria-label="External Link">
                  <ng-icon name="lucideExternalLink" size="20"></ng-icon>
                </a>
              }
            </div>
          </div>
          
          <h3 class="text-xl font-bold text-white mb-3 group-hover:text-primary transition-colors">{{ project.title }}</h3>
          
          <p class="text-slate-400 text-sm leading-relaxed mb-6 flex-grow">
            {{ project.description }}
          </p>

          <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-surfaceBorder/30">
            <span *ngFor="let tech of project.techStack" class="text-xs font-mono text-slate-500">
              {{ tech }}
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
